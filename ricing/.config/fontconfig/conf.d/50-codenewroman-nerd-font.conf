<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <match target="scan">
        <test name="postscriptname" compare="eq">
        <string>CodeNewRomanNF</string>
        </test>
        <edit name="spacing" mode="assign">
        <int>100</int>
        </edit>
    </match>
</fontconfig>
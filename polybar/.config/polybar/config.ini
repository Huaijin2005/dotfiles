[global/wm]
margin-top = 0

[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/main]
#monitor = ${env:MONITOR} 
width = 100%
# height = 24pt
height = 20pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = "FiraMono Nerd Font:size=12:weight=Regular;3"
font-1 = "Noto Serif CJK SC:size=12;3"

# contents to display
modules-left = xworkspaces xwindow
modules-center = date
modules-right = cpu memory filesystem pulseaudio bluetooth wlan eth battery tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

override-redirect = false

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

#label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-mounted = %{F#F0C674}ůįČč%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

#format-volume-prefix = "VOL "
format-volume-prefix = "ůįēĺ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = ůįĖĀ
#label-muted-foreground = ${colors.disabled}

click-right = pavucontrol
[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 1
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 1
#format-prefix = "CPU "
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/bluetooth]
type = custom/script
#exec = rofi-bluetooth --status
#ŤĺďŚáļšłļÁ©ļšľöŤá™Śä®ťöźŤóŹŤŅôšł™ś®°ŚĚó
exec = status=$(/home/huaijin/.local/bin/rofi-bluetooth --status); if [ -z "$status" ]; then echo "Ôäď"; else echo "%{F#F0C674}Ôäď%{F-}$status"; fi
format-prefix-foreground = ${colors.primary}
interval = 1
click-left = rofi-bluetooth &



[network-base]
type = internal/network
interval = 1
format-connected = <label-connected>
format-disconnected = <label-disconnected>
#label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
#label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
#label-connected = %{F#F0C674}ůįĖ©%{F-} %essid% %local_ip%
#label-connected = %{F#F0C674}ůįĖ©%{F-} %local_ip%
label-connected = %{A1:networkmanager_dmenu &:}%{F#F0C674}ůįĖ©%{F-} %essid%%{A}
label-disconnected = %{A1:networkmanager_dmenu &:}ůįĖ©%{A}
#click-left = networkmanager_dmenu &



[module/eth]
inherit = network-base
interface-type = wired
#label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%
label-connected = %{F#F0C674}ůįąÄ%{F-} %ifname%
label-disconnected = "ůįąÄ"

[module/battery]
type = internal/battery
full-at = 99
low-at = 20
battery = BAT0
adapter = ACAD
poll-interval = 5

format-charging = %{F#F0C674}<ramp-capacity>%{F-} <label-charging>
format-full = %{F#F0C674}<ramp-capacity>%{F-} <label-full>
format-discharging = <ramp-capacity> <label-discharging>
format-low = %{F#E44C34}<ramp-capacity>%{F-} <label-low>

label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

[module/date]
type = internal/date
interval = 1

time = %H:%M
#time-alt = 2026-01-01
time-alt = %Y-%m-%d %H:%M

label = %time%
label-foreground = ${colors.primary}

[module/tray]
type = internal/tray
format-margin = 8px
tray-spacing = 8px
tray-size = 60%

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

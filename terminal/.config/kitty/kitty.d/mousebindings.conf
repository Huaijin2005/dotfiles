## Migrated from ~/.config/wezterm/modules/mousebindings.lua

# wezterm copied completed mouse selections to the clipboard.
copy_on_select clipboard

# Right click paste from clipboard.
mouse_map right press ungrabbed,grabbed paste_from_clipboard

# Unsupported in kitty 0.47.1: mouse_map accepts left/middle/right/b1..b8
# with modifiers, but not wheel_up/wheel_down, so Ctrl+wheel font scaling
# from wezterm cannot be mapped directly. Use Ctrl+=, Ctrl+-, and Ctrl+0
# from keybindings.conf instead.
# mouse_map ctrl+wheel_up press ungrabbed,grabbed change_font_size all +1.0
# mouse_map ctrl+wheel_down press ungrabbed,grabbed change_font_size all -1.0
mouse_map ctrl+middle press ungrabbed,grabbed change_font_size all 0

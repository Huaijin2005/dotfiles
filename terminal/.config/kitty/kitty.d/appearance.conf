## Migrated from ~/.config/wezterm/modules/appearance.lua

# Fonts. kitty uses fontconfig for fallback; the first entry mirrors wezterm's
# primary font and the original fallback list is documented below.

# font
font_size 13
font_family CodeNewRoman Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
# wezterm fallback fonts:
# - FiraMono Nerd Font
# - LXGW WenKai Mono GB Screen
# - Noto Serif CJK SC

# Cursor
cursor_shape block
cursor_blink_interval 0.6

# Window
scrollback_lines 10000
window_padding_width 3 7
tab_bar_style hidden

# window
# Superseded: wezterm kept TITLE | RESIZE window decorations.
# hide_window_decorations titlebar-only
hide_window_decorations no
# Superseded by kitty.d/appearance.conf to approximate wezterm cell padding.
# window_padding_width 15
background_opacity 0.8
background_blur 10

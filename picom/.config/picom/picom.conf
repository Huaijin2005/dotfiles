# Basic
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true
vsync = true;

# Corner
corner-radius = 8;
rounded-corners-exclude = [
  "class_g *= 'polybar'",
  "class_g *= 'i3'",
  "class_g *= 'fcitx'", 
];

# Blur
blur: {
  method = "dual_kawase";
  strength = 3;
  background = true;
  background-frame = true;
  background-fixed = true;
}

blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    # GTK CSD装饰会导致Chrome窗口周围的透明像素区域呈现blur效果
    "_GTK_FRAME_EXTENTS@:c",
]
blur-kern = "3x3box"

# Shadow
shadow = false;			# Enabled client-side shadows on windows.
shadow-exclude = [
    "name = 'Notification'",
    "name *= 'VLC'",
    # GTK CSD装饰会导致Chrome窗口周围的透明像素区域呈现blur效果
    "_GTK_FRAME_EXTENTS@:c",
];
# The blur radius for shadows. (default 12)
shadow-radius = 12;
# The left offset for shadows. (default -15)
shadow-offset-x = -5;
# The top offset for shadows. (default -15)
shadow-offset-y = -5;
# The translucency for shadows. (default .75)
shadow-opacity = 0.5;


# Opacity
opacity = 0.9;			# The opacity for menus. (default 1.0)
inactive-opacity = 0.8;			# Opacity of inactive windows. (0.1 - 1.0)
frame-opacity = 1.0;			# Opacity of window titlebars and borders. (0.1 - 1.0)
#inactive-opacity-override = true;	# Inactive opacity set by 'inactive-opacity' overrides value of _NET_WM_OPACITY.

opacity-rule = [
  #"80:class_g = 'Alacritty'",
  #"80:class_g = 'org.wezfurlong.wezterm'",
  "80:class_g = 'QtCreator'",
  "80:class_g = 'kate'",
  "95:class_g = 'Code'",
  "70:class_g = 'Polybar'",
  "100:class_g *?= 'Rofi'",
  "70:class_g *?= 'Dunst'",
  #"100:_NET_WM_STATE@:32a *= '_NET_WM_STATE_STICKY'",
  "100:WM_CLASS@:s *= 'vncviewer'",
  "100:class_g = 'mpv'",
  "100:class_g = 'obs'",
  "100:class_g = 'Gimp'",
  "100:class_g = 'wemeetapp'",
  "100:class_g = 'flameshot'",
  "100:class_g = 'i3'",
  "100:class_g = 'screenkey'",
];


# Fading
fading = true;			# Fade windows during opacity changes.
fade-delta = 3;		# The time between steps in a fade in milliseconds. (default 10).
fade-in-step = 0.03;		# Opacity change between steps while fading in. (default 0.028).
fade-out-step = 0.03;		# Opacity change between steps while fading out. (default 0.03).
no-fading-openclose = true;	# Fade windows in/out when opening/closing.

# Other
inactive-dim = 0.0;		# Dim inactive windows. (0.0 - 1.0, defaults to 0).
mark-wmwin-focused = true;	# Try to detect WM windows and mark them as active.
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;

# Window type settings
wintypes :
{
  tooltip: { fade = true; shadow = false; opacity = 0.85; focus = true; };
  fullscreen: { fade = true; shadow = false; focus = true; opacity = 1.0; };
}

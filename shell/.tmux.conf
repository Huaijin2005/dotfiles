##### 基础终端能力 #####

# tmux 内部 TERM：不要设成 xterm-kitty
set -g default-terminal "tmux-256color"

# 告诉 tmux：外层终端支持这些能力
# xterm-kitty：kitty 直接启动 tmux
# tmux-256color：嵌套 tmux 或从另一个 tmux 进入时尽量保持兼容
set -as terminal-features ',xterm-kitty:RGB,clipboard,focus,hyperlinks,usstyle'
set -as terminal-features ',tmux-256color:RGB,clipboard,focus,hyperlinks,usstyle'

##### 基础体验 #####

set -g mouse on
set -g history-limit 100000
set -g escape-time 10
set -g focus-events on

##### 剪贴板 #####

# 允许 tmux 使用 OSC52 把内容复制到外层终端剪贴板
set -g set-clipboard on

##### yazi / kitty 图片预览 / escape passthrough #####

# 允许 pane 内程序通过 escape sequence 绕过 tmux
# yazi 官方也要求 tmux 用户启用 allow-passthrough
set -g allow-passthrough on

# 让重新 attach 时更新终端相关环境变量
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -ga update-environment KITTY_WINDOW_ID
set -ga update-environment SSH_TTY
set -ga update-environment SSH_CONNECTION
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

# kitty 不支持渐变色块, 影响 [░▒▓](#a3aed2) 显示效果: https://github.com/kovidgoyal/kitty/issues/6108
# 解决方案: 使用纯色块替代 https://github.com/romkatv/powerlevel10k/issues/537#issuecomment-592960982

format = """
[ ](bg:#626A85)\
[ ](bg:#7882A3)\
[ ](bg:#8D99C1)\
[ ](bg:#a3aed2)\
$os\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
[ ](fg:#394260)\
$docker_context\
$c\
$cmake\
$cpp\
$golang\
$haskell\
$java\
$kotlin\
$gradle\
$lua\
$nodejs\
$php\
$python\
$rust\
$swift\
$typst\
$xmake\
$zig\
$nix_shell\
$conda\
$status\
$container\
$shell\
$character
"""

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind)](fg:#769ff0 bg:#394260)]($style)'

[c]
symbol = " "

[character]
success_symbol = '[➜](bold green)'
error_symbol = '[](bold red)'

[cmake]
symbol = " "

[conda]
symbol = " "

#[cpp]
#symbol = " "

[docker_context]
symbol = " "

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path]($style)"
truncation_length = 8
truncate_to_repo = false
truncation_symbol = "…/"
fish_style_pwd_dir_length = 1
read_only = " 󰌾"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_commit]
tag_symbol = '  '

[golang]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[gradle]
symbol = " "

[haskell]
symbol = " "

[java]
symbol = " "

[kotlin]
symbol = " "

[lua]
symbol = " "

[nix_shell]
symbol = " "

[nodejs]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[os]
disabled = false
style = "bg:#a3aed2 fg:#090c0c"

[os.symbols]
Alpaquita = " "
Alpine = " "
AlmaLinux = " "
Amazon = " "
Android = " "
AOSC = " "
Arch = " "
Artix = " "
CachyOS = " "
#CachyOS = "󰥹 "
CentOS = " "
Debian = " "
DragonFly = " "
Elementary = " "
Emscripten = " "
EndeavourOS = " "
Fedora = " "
FreeBSD = " "
Garuda = "󰛓 "
Gentoo = " "
HardenedBSD = "󰞌 "
Illumos = "󰈸 "
Ios = "󰀷 "
Kali = " "
Linux = " "
Mabox = " "
Macos = " "
Manjaro = " "
Mariner = " "
MidnightBSD = " "
Mint = " "
NetBSD = " "
NixOS = " "
Nobara = " "
OpenBSD = "󰈺 "
openSUSE = " "
OracleLinux = "󰌷 "
Pop = " "
Raspbian = " "
Redhat = " "
RedHatEnterprise = " "
RockyLinux = " "
Redox = "󰀘 "
Solus = "󰠳 "
SUSE = " "
Ubuntu = " "
Unknown = " "
Void = " "
Windows = "󰍲 "
Zorin = " "

[php]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[python]
symbol = " "

[rust]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[swift]
symbol = " "

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'

#[xmake]
#symbol = " "

[zig]
symbol = " "
